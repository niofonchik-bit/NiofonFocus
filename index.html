<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>Niofocus</title>
        <link
            rel="icon"
            href="/logo.ico"
            type="image/x-icon"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <div id="root"></div>
        <script
            type="module"
            src="/src/main.tsx"
        ></script>
        <script>
            try {
                const savedTheme = localStorage.getItem('niofon_focus_theme');

                const savedAccent = localStorage.getItem('niofon_focus_accent');

                const savedAccentColor = localStorage.getItem('niofon_focus_accent_color');
                const savedAccentContrast = localStorage.getItem('niofon_focus_accent_contrast');

                document.documentElement.dataset.theme = savedTheme === 'dark' ? 'dark' : 'light';

                document.documentElement.dataset.accent = savedAccent || 'violet';

                if (savedAccentColor && CSS.supports('color', savedAccentColor)) {
                    document.documentElement.style.setProperty('--accent-primary', savedAccentColor);
                }

                if (savedAccentContrast && CSS.supports('color', savedAccentContrast)) {
                    document.documentElement.style.setProperty('--accent-contrast', savedAccentContrast);
                }
            } catch {
                document.documentElement.dataset.theme = 'light';
                document.documentElement.dataset.accent = 'violet';
            }
        </script>
    </body>
</html>
